<!-- BEGIN: Content-->
<div class="app-content content">
    <div class="content-overlay"></div>
    <div class="content-wrapper">
        <div class="content-header row">
        </div>
        <div class="content-body">
            <!-- forgot password start -->
            <section class="row flexbox-container">
                <div class="col-xl-7 col-md-9 col-10  px-0">
                    <div class="card bg-authentication mb-0">
                        <div class="row m-0">
                            <!-- left section-forgot password -->
                            <div class="col-md-6 col-12 px-0">
                                <div class="card disable-rounded-right mb-0">
                                    <div class="card-header">
                                        <div class="card-title">
                                            <h4 class="text-center">Forgot Password?</h4>
                                        </div>
                                    </div>
                                    <div class="card-content">
                                        <div class="card-body">
                                            <div class="text-muted text-center mb-2"><small>Enter your email</small></div>
                                            <form class="mb-2" method="POST" [formGroup]="form" (ngSubmit)="onSubmit()">
                                                <app-alert></app-alert>
                                                <div class="form-group mb-2" [ngClass]="{ 'error': submitted && f.email.errors }">
                                                    <label class="text-bold-600" for="email">Email</label>
                                                    <input type="text" id="email" class="form-control" formControlName="email" placeholder="Email address">
                                                    <div class="help-block" *ngIf="submitted && f.email.errors">
                                                        <ul role="alert">
                                                            <li *ngIf="f.email.errors.required" class="text-danger" role="alert">Email is required.</li>
                                                            <li *ngIf="f.email.errors.email " class="text-danger" role="alert">Email format invalid.</li>
                                                        </ul>
                                                    </div>
                                                </div>
                                                <button type="submit" class="btn btn-primary glow position-relative w-100" [disabled]="isLoading">
                                                    <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span> SEND PASSWORD
                                                    <i id="icon-arrow" class="bx bx-right-arrow-alt"></i>
                                                </button>
                                            </form>
                                            <div class="text-center mb-2"><a routerLink="/login"><small class="text-muted">Back to Login</small></a></div>
                                            <div class="divider mb-2">
                                                <div class="divider-text">Or Sign in as</div>
                                            </div>
                                            <div class="d-flex flex-md-row flex-column">
                                                <a href="#" class="btn btn-social btn-google btn-block font-small-3 mb-1 mb-sm-1 mb-md-0 mr-md-1 text-center">
                                                    <i class="bx bxl-google font-medium-3"></i><span class="pl-1">Google</span></a>
                                                <a href="#" class="btn btn-social btn-facebook btn-block font-small-3 text-center mt-0">
                                                    <i class="bx bxl-facebook-square font-medium-3"></i><span class="pl-1">Facebook</span></a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- right section image -->
                            <div class="col-md-6 d-md-block d-none text-center align-self-center">
                                <img class="img-fluid" src="assets/images/pages/forgot-password.png" alt="branding logo" width="300">
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!-- forgot password ends -->
        </div>
    </div>
</div>
<!-- END: Content-->
