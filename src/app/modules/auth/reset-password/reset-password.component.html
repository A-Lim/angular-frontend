 <!-- BEGIN: Content-->
 <div class="app-content content">
    <div class="content-overlay"></div>
    <div class="content-wrapper">
        <div class="content-header row">
        </div>
        <div class="content-body">
            <!-- reset password start -->
            <section class="row flexbox-container">
                <div class="col-xl-7 col-10">
                    <div class="card bg-authentication mb-0">
                        <div class="row m-0">
                            <!-- left section-login -->
                            <div class="col-md-6 col-12 px-0">
                                <div class="card disable-rounded-right d-flex justify-content-center mb-0 p-2 h-100">
                                    <div class="card-header pb-1">
                                        <div class="card-title">
                                            <h4 class="text-center mb-2">Reset your Password</h4>
                                        </div>
                                    </div>
                                    <div class="card-content">
                                        <div class="card-body">
                                            <form class="mb-2" method="POST" [formGroup]="form" (ngSubmit)="onSubmit()">
                                                <app-alert></app-alert>
                                                <div class="form-group" [ngClass]="{ 'error': submitted && f.password.errors }">
                                                    <label class="text-bold-600" for="password">New Password</label>
                                                    <input type="password" formControlName="password" class="form-control" id="password" placeholder="Enter a new password">
                                                    <div class="help-block" *ngIf="submitted && f.password.errors">
                                                        <ul role="alert">
                                                            <li *ngIf="f.password.errors.required" class="text-danger" role="alert">Password is required.</li>
                                                            <li *ngIf="f.password.errors.minlength " class="text-danger" role="alert">Password must be at least 6 characters.</li>
                                                        </ul>
                                                    </div>
                                                </div>
                                                <div class="form-group mb-2" [ngClass]="{ 'error': submitted && f.confirmPassword.errors }">
                                                    <label class="text-bold-600" for="confirmPassword">Confirm New Password</label>
                                                    <input type="password" formControlName="confirmPassword" class="form-control" id="confirmPassword" placeholder="Confirm your new password">
                                                    <div class="help-block" *ngIf="submitted && f.confirmPassword.errors">
                                                        <ul role="alert">
                                                            <li *ngIf="f.confirmPassword.errors.matchValue" class="text-danger" role="alert">Confirm password does not match.</li>
                                                        </ul>
                                                    </div>
                                                </div>
                                                <button type="submit" class="btn btn-primary glow position-relative w-100" [disabled]="isLoading || form.disabled">
                                                    <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span> Reset my password<i id="icon-arrow" class="bx bx-right-arrow-alt"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- right section image -->
                            <div class="col-md-6 d-md-block d-none text-center align-self-center p-3">
                                <img class="img-fluid" src="assets/images/pages/reset-password.png" alt="branding logo">
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!-- reset password ends -->

        </div>
    </div>
</div>
<!-- END: Content-->
