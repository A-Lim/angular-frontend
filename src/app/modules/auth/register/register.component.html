<!-- BEGIN: Content-->
<div class="app-content content">
    <div class="content-overlay"></div>
    <div class="content-wrapper">
        <div class="content-header row">
        </div>
        <div class="content-body">
            <!-- register section starts -->
            <section class="row flexbox-container">
                <div class="col-xl-8 col-10">
                    <div class="card bg-authentication mb-0">
                        <div class="row m-0">
                            <!-- register section left -->
                            <div class="col-md-6 col-12 px-0">
                                <div class="card disable-rounded-right mb-0 p-2 h-100 d-flex justify-content-center">
                                    <div class="card-header pb-1">
                                        <div class="card-title">
                                            <h4 class="text-center mb-2">Sign Up</h4>
                                        </div>
                                    </div>
                                    <div class="text-center">
                                        <p> <small> Please enter your details to sign up and be part of our great community</small>
                                        </p>
                                    </div>
                                    <div class="card-content">
                                        <div class="card-body">
                                            <form method="POST" [formGroup]="form" (ngSubmit)="onSubmit()">
                                                <app-alert></app-alert>
                                                <div class="form-group mb-50" [ngClass]="{ 'error': submitted && f.name.errors }">
                                                    <label class="text-bold-600" for="name">Name</label>
                                                    <input type="text" formControlName="name" class="form-control" id="name" placeholder="Name">
                                                    <div class="help-block" *ngIf="submitted && f.name.errors">
                                                        <ul role="alert">
                                                            <li *ngIf="f.name.errors.required" class="text-danger" role="alert">Name is required.</li>
                                                        </ul>
                                                    </div>
                                                </div>
                                                <div class="form-group mb-50" [ngClass]="{ 'error': submitted && f.email.errors }">
                                                    <label class="text-bold-600" for="email">Email address</label>
                                                    <input type="email" formControlName="email" class="form-control" id="email" placeholder="Email address">
                                                    <div class="help-block" *ngIf="submitted && f.email.errors">
                                                        <ul role="alert">
                                                            <li *ngIf="f.email.errors.required" class="text-danger" role="alert">Email is required.</li>
                                                            <li *ngIf="f.email.errors.email " class="text-danger" role="alert">Email format invalid.</li>
                                                        </ul>
                                                    </div>
                                                </div>
                                                <div class="form-group mb-50" [ngClass]="{ 'error': submitted && f.password.errors }">
                                                    <label class="text-bold-600" for="password">Password</label>
                                                    <input type="password" formControlName="password" class="form-control" id="password" placeholder="Password">
                                                    <div class="help-block" *ngIf="submitted && f.password.errors">
                                                        <ul role="alert">
                                                            <li *ngIf="f.password.errors.required" class="text-danger" role="alert">Password is required.</li>
                                                            <li *ngIf="f.password.errors.minlength " class="text-danger" role="alert">Password must be at least 6 characters.</li>
                                                        </ul>
                                                    </div>
                                                </div>
                                                <div class="form-group mb-2" [ngClass]="{ 'error': submitted && f.confirmPassword.errors }">
                                                    <label class="text-bold-600" for="confirmPassword">Confirm Password</label>
                                                    <input type="password" formControlName="confirmPassword" class="form-control" id="confirmPassword" placeholder="Confirm Password">
                                                    <div class="help-block" *ngIf="submitted && f.confirmPassword.errors">
                                                        <ul role="alert">
                                                            <li *ngIf="f.confirmPassword.errors.matchValue" class="text-danger" role="alert">Confirm password does not match.</li>
                                                        </ul>
                                                    </div>
                                                </div>
                                                <button type="submit" class="btn btn-primary glow position-relative w-100" [disabled]="isLoading"><span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span> SIGN UP<i id="icon-arrow" class="bx bx-right-arrow-alt"></i></button>
                                            </form>
                                            <hr>
                                            <div class="text-center"><small class="mr-25">Already have an account?</small><a routerLink="/login"><small>Sign in</small> </a></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- image section right -->
                            <div class="col-md-6 d-md-block d-none text-center align-self-center p-3">
                                <img class="img-fluid" src="assets/images/pages/register.png" alt="branding logo">
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!-- register section endss -->
        </div>
    </div>
</div>
<!-- END: Content-->
