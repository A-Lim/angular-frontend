<div class="row">
  <div class="col-md-3 user-profile-card">
    <div class="card">
      <div class="card-header mx-auto pt-3">
        <div class="avatar bg-rgba-primary p-50">
          <img class="img-fluid" src="assets/images/profile/user-uploads/social-2.jpg" height="134" width="134">
        </div>
      </div>
      <div class="card-content">
        <div class="card-body text-center">
          <h4 *ngIf="user">{{ user.name }}</h4>

          <!-- <h6 class="text-bold-500 font-small-3">Status</h6> -->
          <p *ngIf="user">
            <span class="badge text-bold-500 py-10" [class.badge-light-success]="user.status === 'active'"
              [class.badge-light-warning]="user.status === 'unverified'"
              [class.badge-light-danger]="user.status === 'locked'"
              [class.badge-light-danger]="user.status === 'banned'">{{ user.status }}</span>
          </p>

          <h6 class="text-bold-500 font-small-3">User Groups</h6>
          <ng-container *ngIf="user">
            <div *ngFor="let usergroup of user.usergroups" class="badge badge-default">{{ usergroup.name }}</div>
          </ng-container>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-9">
    <div class="card">
      <div class="card-header">
        <div class="card-title">User Details</div>
      </div>
      <div class="card-content">
        <div class="card-body">
          <form method="POST" [formGroup]="form" (ngSubmit)="onSubmit()">
            <shared-alert></shared-alert>
            <div class="form-group mb-50" [ngClass]="{ 'error': submitted && f.name.errors }">
              <label class="text-bold-600" for="name">Name</label>
              <input type="text" class="form-control" id="name" formControlName="name" placeholder="Name">
              <div class="help-block" *ngIf="submitted && f.name.errors">
                <ul role="alert">
                  <li *ngIf="f.name.errors.required" class="text-danger" role="alert">Name is required.</li>
                </ul>
              </div>
            </div>
            <div class="form-group mb-50" [ngClass]="{ 'error': submitted && f.email.errors }">
              <label class="text-bold-600" for="email">Email address</label>
              <input type="email" class="form-control" id="email" formControlName="email" placeholder="Email address">
            </div>

            <div class="form-group mb-50" [ngClass]="{ 'error': submitted && f.status.errors }">
              <label class="text-bold-600" for="status">Status</label>
              <select class="form-control" id="status" formControlName="status">
                <option value="active">Active</option>
                <option value="unverified">Unverified</option>
                <option value="locked">Locked</option>
              </select>
            </div>
            <div class="form-group mb-50" [ngClass]="{ 'error': submitted && f.usergroups.errors }">
              <label class="text-bold-600" for="usergroups">User Groups</label>
              <shared-formcontrol-select></shared-formcontrol-select>
              <hr />
              <select appSelect2 multiple class="select2 form-control" id="usergroups" formControlName="usergroups">
                <option [value]="usergroup.id" *ngFor="let usergroup of usergroups">{{ usergroup.name }}</option>
              </select>
              <div class="help-block" *ngIf="submitted && f.usergroups.errors">
                <ul role="alert">
                  <li *ngIf="f.usergroups.errors.required" class="text-danger" role="alert">Usergroup is required.</li>
                </ul>
              </div>
            </div>

            <div class="form-actions d-flex justify-content-end">
              <button type="submit" class="btn btn-primary pull-right" [disabled]="isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm"></span> Edit
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
