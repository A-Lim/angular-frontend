<!-- BEGIN: Main Menu-->
<div class="main-menu menu-fixed menu-light menu-accordion menu-shadow" data-scroll-to-active="true"
  [ngClass]="isHoverOver ? 'expanded' : ''"
  (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">

  <div class="navbar-header"
    [ngClass]="isHoverOver ? 'expanded' : ''">
    <ul class="nav navbar-nav flex-row">
      <li class="nav-item mr-auto"><a class="navbar-brand" href="../../../html/ltr/vertical-menu-template/index.html">
          <div class="brand-logo"></div>
          <h2 class="brand-text mb-0">Frest</h2>
        </a></li>
      <li class="nav-item nav-toggle">
        <a class="nav-link modern-nav-toggle pr-0" data-toggle="collapse" (click)="toggleMenu()">
          <i class="bx bx-x d-block d-xl-none font-medium-4 primary"></i>
          <i class="toggle-icon bx font-medium-4 d-none d-xl-block primary"
            [ngClass]="menuIsOpened ? 'bx-disc' : 'bx-circle'"></i>
        </a>
      </li>
    </ul>
  </div>
  <div class="shadow-bottom"></div>

  <div class="main-menu-content">
    <ul class="navigation navigation-main" id="main-menu-navigation" data-menu="menu-navigation"
      data-icon-style="lines">
      <li class="nav-item">
        <a href="../../../html/ltr/vertical-menu-template/index.html">
          <i class="bx bx-dashboard"></i>
          <span class="menu-title" data-i18n="Dashboard">Dashboard</span>
        </a>
        <ul class="menu-content">
          <li><a href="dashboard-ecommerce.html"><i class="bx bx-right-arrow-alt"></i><span class="menu-item"
                data-i18n="eCommerce">eCommerce</span></a>
          </li>
          <li routerLinkActive="active"><a routerLink="/admin/dashboard"><i class="bx bx-right-arrow-alt"></i><span
                class="menu-item" data-i18n="Analytics">Analytics</span></a>
          </li>
        </ul>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a href="#" routerLink="/admin/users">
          <i class="bx bx-user-circle"></i>
          <span class="menu-title" data-i18n="Users">Users</span>
        </a>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a href="#" routerLink="/admin/usergroups">
          <i class="bx bxs-group"></i>
          <span class="menu-title" data-i18n="User Groups">User Groups</span>
        </a>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a href="#" routerLink="/admin/products">
          <i class="bx bxs-shopping-bag"></i>
          <span class="menu-title" data-i18n="Products">Products</span>
        </a>
      </li>
      <li class="nav-item" routerLinkActive="active">
        <a class="d-block" href="#" routerLink="/admin/orders">
          <i class="bx bxs-cart"></i>
          <span class="menu-title" data-i18n="Orders">Orders</span>
          <ng-container *ngFor="let badge of badges">
            <ng-container [ngSwitch]="badge.status">
              <span *ngSwitchCase="'pending'" class="badge badge-light-danger badge-pill badge-round float-right ml-1" title="Pending">{{ badge.total }}</span>
              <span *ngSwitchCase="'paid'" class="badge badge-light-info badge-pill badge-round float-right ml-1" title="Paid">{{ badge.total }}</span>
            </ng-container>
          </ng-container>
        </a>
      </li>
    </ul>
  </div>
</div>

<!-- END: Main Menu-->
